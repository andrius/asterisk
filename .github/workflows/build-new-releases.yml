name: Build New Asterisk Releases

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'asterisk/supported-asterisk-builds.yml'

  push:
    branches:
      - main
    paths:
      - 'asterisk/supported-asterisk-builds.yml'

permissions:
  contents: write  # announce-releases reusable workflow pushes announced-* tags; caller must grant >= callee's request or the run fails at startup
  pull-requests: write
  packages: write

jobs:
  detect-new-releases:
    runs-on: ubuntu-latest
    outputs:
      new_versions: ${{ steps.extract-versions.outputs.new_versions }}
      has_new_versions: ${{ steps.extract-versions.outputs.has_new_versions }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Extract new versions
        id: extract-versions
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🔍 Detecting new Asterisk versions in PR..."
            git fetch origin ${{ github.base_ref }}
            COMPARE_REF="origin/${{ github.base_ref }}"
          else
            echo "🔍 Detecting new Asterisk versions in push to main..."
            COMPARE_REF="HEAD^"
          fi

          # Compare YAML structurally: a version is "new" if it is active
          # (has os_matrix, no deprecated_at) at HEAD but was not active at
          # COMPARE_REF. This is robust against comment-out style edits and
          # other text-level diff noise.
          BASE_YAML=$(git show "$COMPARE_REF:asterisk/supported-asterisk-builds.yml" 2>/dev/null || echo "")
          HEAD_YAML=$(cat asterisk/supported-asterisk-builds.yml)

          NEW_VERSIONS=$(BASE_YAML="$BASE_YAML" HEAD_YAML="$HEAD_YAML" python3 - <<'PY'
          import os, sys, yaml

          def active_versions(text):
              if not text:
                  return set()
              try:
                  data = yaml.safe_load(text) or {}
              except yaml.YAMLError as e:
                  print(f"⚠️  Failed to parse YAML: {e}", file=sys.stderr)
                  return set()
              out = set()
              for build in data.get('latest_builds', []) or []:
                  version = build.get('version')
                  if not version:
                      continue
                  if 'os_matrix' not in build:
                      continue
                  if build.get('deprecated_at'):
                      continue
                  out.add(version)
              return out

          base = active_versions(os.environ.get('BASE_YAML', ''))
          head = active_versions(os.environ.get('HEAD_YAML', ''))
          new = sorted(head - base)
          print(' '.join(new))
          PY
          )

          if [ -z "$NEW_VERSIONS" ]; then
            echo "has_new_versions=false" >> $GITHUB_OUTPUT
            echo "new_versions=" >> $GITHUB_OUTPUT
            echo "📋 No new versions detected"
          else
            echo "has_new_versions=true" >> $GITHUB_OUTPUT
            echo "new_versions=$NEW_VERSIONS" >> $GITHUB_OUTPUT
            echo "🎉 New versions detected: $NEW_VERSIONS"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.extract-versions.outputs.has_new_versions == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const newVersions = '${{ steps.extract-versions.outputs.new_versions }}'.split(' ');
            const body = `## 🎆 New Asterisk Releases Detected

            This PR adds the following new versions:
            ${newVersions.map(v => '- `' + v + '`').join('\n')}

            🔨 Building and pushing Docker images with \\\`-dev\\\` suffix for validation...

            **Note**: Images are pushed to **GitHub Container Registry only** (\\\`ghcr.io\\\`) with \\\`-dev\\\` tags (e.g., \\\`latest-dev\\\`, \\\`stable-dev\\\`) to avoid consuming Docker Hub quota. Production tags will be created on both registries after merging to main.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  prepare-matrix:
    needs: detect-new-releases
    if: needs.detect-new-releases.outputs.has_new_versions == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      total_builds: ${{ steps.generate-matrix.outputs.total_builds }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install --user pyyaml

      - name: Generate build matrix for new versions only
        id: generate-matrix
        run: |
          python3 -c "
          import yaml
          import json
          import sys

          try:
              with open('asterisk/supported-asterisk-builds.yml', 'r') as f:
                  data = yaml.safe_load(f)

              matrix = {'include': []}
              new_versions_str = '${{ needs.detect-new-releases.outputs.new_versions }}'
              new_versions = [v.strip() for v in new_versions_str.split() if v.strip()]

              print(f'🎯 Filtering for new versions: {new_versions}', file=sys.stderr)

              total_configs = 0

              for build in data.get('latest_builds', []):
                  version = build.get('version')
                  if not version:
                      continue

                  # Only process new versions
                  if version not in new_versions:
                      continue

                  if 'os_matrix' not in build:
                      print(f'⏭️  Skipping {version} (no os_matrix - disabled)', file=sys.stderr)
                      continue

                  if build.get('deprecated_at'):
                      print(f'⏭️  Skipping {version} (deprecated since {build[\"deprecated_at\"]})', file=sys.stderr)
                      continue

                  os_matrix = build['os_matrix']
                  default_tags = build.get('additional_tags', '')

                  if isinstance(os_matrix, dict):
                      os_matrix = [os_matrix]

                  for matrix_entry in os_matrix:
                      os_name = matrix_entry.get('os', 'debian')
                      distribution = matrix_entry.get('distribution', 'trixie')
                      architectures = matrix_entry.get('architectures', ['amd64'])
                      # Per-entry additional_tags overrides version-level default
                      entry_tags = matrix_entry.get('additional_tags', default_tags)

                      architectures_str = ','.join(architectures)
                      matrix_item = {
                          'version': version,
                          'distribution': distribution,
                          'architectures': architectures_str,
                          'os': os_name
                      }

                      # Add additional_tags if present
                      if entry_tags:
                          matrix_item['additional_tags'] = entry_tags

                      matrix['include'].append(matrix_item)
                      total_configs += 1

                      tags_info = f' +tags: {entry_tags}' if entry_tags else ''
                      print(f'✅ Added: {version} {os_name}/{distribution} [{architectures_str}]{tags_info}', file=sys.stderr)

              if total_configs == 0:
                  print('❌ No buildable configurations found for new versions!', file=sys.stderr)
                  sys.exit(1)

              print(f'📊 Generated {total_configs} build configurations for new versions', file=sys.stderr)
              print('matrix=' + json.dumps(matrix))
              print('total_builds=' + str(total_configs))

          except Exception as e:
              print(f'❌ ERROR: Failed to parse YAML: {e}', file=sys.stderr)
              sys.exit(1)
          " | tee -a $GITHUB_OUTPUT

  build-matrix:
    needs: [detect-new-releases, prepare-matrix]
    if: needs.detect-new-releases.outputs.has_new_versions == 'true'
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5

    uses: ./.github/workflows/build-single-image.yml
    with:
      version: ${{ matrix.version }}
      distribution: ${{ matrix.distribution }}
      architectures: ${{ matrix.architectures }}
      additional_tags: ${{ matrix.additional_tags || '' }}
      push: true  # Always push for multi-platform builds (PR = -dev suffix, main = production)
      registry: 'andrius/asterisk'
    secrets: inherit

  report-results:
    needs: [detect-new-releases, prepare-matrix, build-matrix]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && needs.detect-new-releases.outputs.has_new_versions == 'true'

    steps:
      - name: Comment build results on PR
        uses: actions/github-script@v9
        with:
          script: |
            const newVersions = '${{ needs.detect-new-releases.outputs.new_versions }}'.split(' ');
            const totalBuilds = '${{ needs.prepare-matrix.outputs.total_builds }}';
            const buildResult = '${{ needs.build-matrix.result }}';

            let status = '';
            let emoji = '';

            if (buildResult === 'success') {
              status = 'All builds passed';
              emoji = '✅';
            } else if (buildResult === 'failure') {
              status = 'Some builds failed';
              emoji = '❌';
            } else {
              status = 'Builds cancelled or skipped';
              emoji = '⚠️';
            }

            const body = `## ${emoji} Build Results for New Releases

            **Status**: ${status}
            **Versions**: ${newVersions.map(v => '`' + v + '`').join(', ')}
            **Total configurations**: ${totalBuilds}

            ${buildResult === 'success' ?
              '✅ All Docker images built and pushed successfully with `-dev` suffix! Safe to merge.' :
              '❌ Build failures detected. Please review the workflow logs before merging.'}

            **Note**: Images are pushed to **GitHub Container Registry only** (\\\`ghcr.io\\\`) with \\\`-dev\\\` tags for validation to avoid consuming Docker Hub quota. Production tags will be created on both registries after merging to main.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  announce-releases:
    needs: [detect-new-releases, prepare-matrix, build-matrix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-new-releases.outputs.has_new_versions == 'true' && needs.build-matrix.result == 'success'
    uses: ./.github/workflows/announce-releases.yml
    with:
      versions: ${{ needs.detect-new-releases.outputs.new_versions }}
    secrets: inherit
