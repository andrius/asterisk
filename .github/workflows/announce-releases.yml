name: Announce Releases

# Posts a single grouped announcement to Telegram and Mastodon for one or more
# Asterisk versions, then pushes an `announced-<version>` git tag per version
# so the same version is never announced twice. Finally adds an entry to the
# andrius.mobi/asterisk timeline via repository_dispatch to andrius/blog
# (skipped when the BLOG_DISPATCH_TOKEN secret is not configured).
#
# Triggered by:
#   - `workflow_call` from build-new-releases.yml after a successful build of
#     newly-merged versions.
#   - `workflow_dispatch` for manual backfill, recovery, or dry-run preview.

on:
  workflow_call:
    inputs:
      versions:
        description: "Space-separated list of versions to announce"
        required: true
        type: string
      dry_run:
        description: "Preview only - skip posts and tag pushes"
        required: false
        type: boolean
        default: false
      force:
        description: "Re-announce even if `announced-<version>` tag exists"
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      versions:
        description: "Space-separated versions (e.g. '22.9.0 23.3.0')"
        required: true
        type: string
      dry_run:
        description: "Preview only - skip posts and tag pushes"
        required: false
        type: boolean
        default: false
      force:
        description: "Re-announce even if `announced-<version>` tag exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # required to push announced-* tags

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Filter un-announced versions
        id: filter
        env:
          INPUT_VERSIONS: ${{ inputs.versions }}
          FORCE: ${{ inputs.force }}
        run: |
          REMAINING=()
          SKIPPED=()

          for v in $INPUT_VERSIONS; do
            [ -z "$v" ] && continue
            TAG="announced-$v"
            if [ "$FORCE" = "true" ]; then
              REMAINING+=("$v")
              echo "⚙️  $v will be announced (force=true)"
              continue
            fi
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
              SKIPPED+=("$v")
              echo "⏭️  $v already announced (tag $TAG exists)"
            else
              REMAINING+=("$v")
              echo "✅ $v will be announced"
            fi
          done

          if [ ${#REMAINING[@]} -eq 0 ]; then
            echo "has_versions=false" >> "$GITHUB_OUTPUT"
            echo "versions=" >> "$GITHUB_OUTPUT"
            echo "📋 Nothing to announce"
          else
            echo "has_versions=true" >> "$GITHUB_OUTPUT"
            echo "versions=${REMAINING[*]}" >> "$GITHUB_OUTPUT"
          fi
          echo "skipped=${SKIPPED[*]}" >> "$GITHUB_OUTPUT"

      - name: Prepare announcement message
        id: message
        if: steps.filter.outputs.has_versions == 'true'
        env:
          FILTERED_VERSIONS: ${{ steps.filter.outputs.versions }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          VERSION_LIST=$(echo "$FILTERED_VERSIONS" | tr ' ' '\n' | sed 's/^/- /')

          PREFIX=""
          if [ "$DRY_RUN" = "true" ]; then
            PREFIX="🔍 DRY RUN - "
          fi

          MASTODON_MESSAGE="${PREFIX}🎆 New Asterisk Docker Images Released!

          Versions:
          ${VERSION_LIST}

          Available on:
          - Docker Hub: docker.io/andrius/asterisk
          - GitHub Container Registry: ghcr.io/andrius/asterisk

          Pull with: docker pull andrius/asterisk:VERSION

          GitHub: https://github.com/${REPO}
          "

          # Telegram MarkdownV2 requires escaping these special chars
          TELEGRAM_MESSAGE=$(echo "$MASTODON_MESSAGE" | sed 's/[_*[\]()~`>#+=|{}.!-]/\\&/g')

          {
            echo "telegram_message<<MSG_EOF"
            echo "$TELEGRAM_MESSAGE"
            echo "MSG_EOF"
            echo "mastodon_message<<MSG_EOF"
            echo "$MASTODON_MESSAGE"
            echo "MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Dry-run preview
        if: steps.filter.outputs.has_versions == 'true' && inputs.dry_run == true
        env:
          TG_MSG: ${{ steps.message.outputs.telegram_message }}
          MD_MSG: ${{ steps.message.outputs.mastodon_message }}
        run: |
          {
            echo "## Dry-run preview"
            echo
            echo "### Telegram"
            echo '```'
            printf '%s\n' "$TG_MSG"
            echo '```'
            echo "### Mastodon"
            echo '```'
            printf '%s\n' "$MD_MSG"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Announce on Telegram
        if: steps.filter.outputs.has_versions == 'true' && inputs.dry_run != true && vars.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ vars.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: ${{ steps.message.outputs.telegram_message }}
          format: markdown

      - name: Announce on Mastodon
        if: steps.filter.outputs.has_versions == 'true' && inputs.dry_run != true && vars.MASTODON_URL != ''
        uses: cbrgm/mastodon-github-action@v2.1.8
        with:
          access-token: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          url: ${{ vars.MASTODON_URL }}
          message: ${{ steps.message.outputs.mastodon_message }}

      - name: Tag announced versions
        if: steps.filter.outputs.has_versions == 'true' && inputs.dry_run != true
        env:
          FILTERED_VERSIONS: ${{ steps.filter.outputs.versions }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for v in $FILTERED_VERSIONS; do
            TAG="announced-$v"
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
              echo "🏷️  $TAG already on remote - not re-pushing"
              continue
            fi
            git tag -a "$TAG" -m "Announced on Telegram and Mastodon"
            git push origin "$TAG"
            echo "🏷️  Pushed tag $TAG"
          done

      # Failure here is loud on purpose: announcements and tags are already
      # safe (a re-run skips them), and the missed entry can be recovered with
      # the blog's manual workflow_dispatch (asterisk-updates.yml).
      - name: Update andrius.mobi/asterisk timeline
        if: steps.filter.outputs.has_versions == 'true' && inputs.dry_run != true
        env:
          BLOG_DISPATCH_TOKEN: ${{ secrets.BLOG_DISPATCH_TOKEN }}
          FILTERED_VERSIONS: ${{ steps.filter.outputs.versions }}
        run: |
          if [ -z "$BLOG_DISPATCH_TOKEN" ]; then
            echo "::notice::BLOG_DISPATCH_TOKEN not set - skipping timeline update"
            exit 0
          fi
          VERSION_LIST=$(echo "$FILTERED_VERSIONS" | sed 's/ /, /g; s/, \([^,]*\)$/ and \1/')
          TITLE="Debian images for Asterisk $VERSION_LIST"
          PAYLOAD=$(jq -n --arg title "$TITLE" '{
            event_type: "asterisk-update",
            client_payload: {
              title: $title,
              url: "https://hub.docker.com/r/andrius/asterisk/tags",
              tags: "docker,debian"
            }
          }')
          curl -sfS -X POST \
            -H "Authorization: Bearer $BLOG_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/andrius/blog/dispatches \
            -d "$PAYLOAD"
          echo "📝 Timeline entry sent: $TITLE"

      - name: Summary
        if: always()
        env:
          INPUT_VERSIONS: ${{ inputs.versions }}
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE: ${{ inputs.force }}
          ANNOUNCED: ${{ steps.filter.outputs.versions }}
          SKIPPED: ${{ steps.filter.outputs.skipped }}
        run: |
          {
            echo "## Announce summary"
            echo
            echo "- **Input**: \`$INPUT_VERSIONS\`"
            echo "- **Mode**: $( [ "$DRY_RUN" = "true" ] && echo "dry-run" || echo "live" )"
            echo "- **Force**: $FORCE"
            if [ -n "$ANNOUNCED" ]; then
              echo "- **Announced**: \`$ANNOUNCED\`"
            else
              echo "- **Announced**: _(none)_"
            fi
            if [ -n "$SKIPPED" ]; then
              echo "- **Skipped (already announced)**: \`$SKIPPED\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
