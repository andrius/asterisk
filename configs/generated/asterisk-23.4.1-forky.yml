asterisk:
  addons:
    version: null
  configure_options:
  - --with-pjproject-bundled
  - --with-ssl=ssl
  - --with-crypto
  menuselect:
    apps:
    - app_voicemail
    - app_queue
    - app_confbridge
    - app_directory
    - app_dial
    - app_playback
    - app_record
    - app_echo
    - app_mixmonitor
    channels:
    - chan_pjsip
    - chan_iax2
    - chan_local
    - chan_bridge_media
    - chan_websocket
    drivers:
    - res_musiconhold
    - res_pjsip
    - res_pjsip_session
    - res_pjsip_outbound_registration
    - res_pjsip_registrar
    - res_rtp_asterisk
    - res_timing_timerfd
    - res_crypto
    exclude:
    - chan_dahdi
    - chan_misdn
    - app_festival
    - chan_sip
  opus_codec:
    enabled: true
    major_version: 23
  source:
    url_template: https://downloads.asterisk.org/pub/telephony/asterisk/releases/asterisk-{version}.tar.gz
base:
  distribution: forky
  image: debian:forky
  os: debian
  runtime_autoderive: true
build:
  args:
    ASTERISK_VERSION: 23.4.1
    DEBIAN_FRONTEND: noninteractive
  script: build-asterisk.sh
docker:
  expose_ports:
  - 5060/udp
  - 5060/tcp
  - 10000-20000/udp
  registry: docker.io
  repository: asterisk
  tags:
  - 23.4.1_debian-forky
  - 23.4.1_debian-forky-amd64
  volumes:
  - /var/lib/asterisk/sounds
  - /var/lib/asterisk/keys
  - /var/lib/asterisk/phoneprov
  - /var/spool/asterisk
  - /var/log/asterisk
  - /etc/asterisk
features:
  hep: false
  pjsip: true
  recordings: true
  tls: true
  websockets: true
packages:
  build:
  - build-essential
  - autoconf
  - binutils-dev
  - ca-certificates
  - curl
  - file
  - libcurl4-openssl-dev
  - libedit-dev
  - libgsm1-dev
  - libicu-dev
  - libjansson-dev
  - libncurses-dev
  - libogg-dev
  - libpopt-dev
  - libpqxx-dev
  - libresample1-dev
  - libspandsp-dev
  - libspeex-dev
  - libspeexdsp-dev
  - libsqlite3-dev
  - libssl-dev
  - libtool
  - libvorbis-dev
  - libxml2-dev
  - libxslt1-dev
  - make
  - odbcinst
  - patch
  - pkg-config
  - portaudio19-dev
  - procps
  - python3-dev
  - unixodbc
  - unixodbc-dev
  - uuid
  - uuid-dev
  - xmlstarlet
  - libsrtp2-dev
  runtime:
  - binutils
  - ca-certificates
  - curl
  - gettext-base
  - odbcinst
  - portaudio19-dev
  - procps
  - python3
  - unixodbc
  - uuid
version: 23.4.1
