asterisk: {}
base:
  distribution: edge
  image: alpine:edge
  os: alpine
build:
  type: single-stage
docker:
  expose_ports:
  - 5060/udp
  - 5060/tcp
  - 10000-20000/udp
  registry: docker.io
  repository: asterisk
  tags:
  - 22.10.1_alpine-edge
  - 22.10.1_alpine-edge-amd64
  volumes:
  - /var/lib/asterisk/sounds
  - /var/lib/asterisk/keys
  - /var/lib/asterisk/phoneprov
  - /var/spool/asterisk
  - /var/log/asterisk
  - /etc/asterisk
packages:
  build: []
  runtime: []
version: 22.10.1
alpine:
  tree: edge
  repo_url: https://dl.cloudsmith.io/public/asterisk/alpine/alpine/edge/main
  pin_tag: andrius-asterisk-edge
  signing_key_file: cloudsmith-asterisk-alpine.rsa.pub
  signing_key_dest: /etc/apk/keys/alpine@asterisk-25B0C9A992BE0CEF.rsa.pub
  runtime_packages:
  - bash
  - shadow
  - gettext
  - procps
  - ca-certificates
  - curl
  - tzdata
  apk_packages:
  - opus
  - srtp
  - curl
  - speex
  - fax
  - odbc
  - ldap
  - pgsql
  - prometheus
  - mobile
  - tds
  apk_version: 22.10.1-r0
