# Alpine (musl) Distribution Configuration
#
# Unlike the Debian distribution files, Alpine images are NOT compiled here.
# They install pre-built, signed Asterisk .apk packages from the sibling
# project's Cloudsmith repository (andrius/asterisk-alpine). There is no build
# stage and no build.sh for an Alpine image. See plans/003-alpine-apk-images.md.
#
# One file serves every Alpine build. The specific Alpine version (3.24, edge,
# ...), its Cloudsmith tree, role, exact apk pin, subpackages, and architectures
# ride the os_matrix entry and are resolved from the published APKINDEX by the
# daily alpine-sync workflow - never hand-edited.

os: alpine

# Cloudsmith consumption contract (public, anonymous pull; migrated off the
# retired apk.andrius.mobi GitHub Pages host on 2026-07-16). apk appends
# "/<arch>/APKINDEX.tar.gz" to "<apk_repo_base>/<tree>/main" itself, where
# <tree> is the Cloudsmith distribution segment (v3.24 stable, edge).
apk_repo_base: "https://dl.cloudsmith.io/public/asterisk/alpine/alpine"

# Repository pin tag. Alpine's own main repo ships asterisk 22.9.x, so installs
# MUST pin this repo explicitly: "asterisk@<pin_tag>=<exact apk_version>".
# The edge tree uses the "<pin_tag>-edge" form (derived per build by role).
apk_pin_tag: "andrius-asterisk"

# Cloudsmith re-signs packages with its own per-repo RSA key (the old abuild key
# is no longer in the consumer trust chain). The public key is vendored under
# templates/partials/keys/<signing_key_file> and copied into each image build
# context; apk matches it by the destination filename.
signing_key_file: "cloudsmith-asterisk-alpine.rsa.pub"
signing_key_dest: "/etc/apk/keys/alpine@asterisk-25B0C9A992BE0CEF.rsa.pub"

# Non-Asterisk runtime packages. bash + shadow let the shared (bash) entrypoint
# and healthcheck partials run unchanged (usermod/groupmod for PUID/PGID);
# gettext provides envsubst for config templating - parity with the Debian image.
runtime_packages:
  - bash
  - shadow
  - gettext
  - ca-certificates
  - curl
  - tzdata
